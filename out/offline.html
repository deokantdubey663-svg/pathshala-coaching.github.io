<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Pathshala Coaching</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #115e59 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .icon svg {
      width: 60px;
      height: 60px;
      fill: white;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    button {
      background: white;
      color: #0f766e;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .tips {
      margin-top: 32px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      text-align: left;
    }

    .tips h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
      margin-bottom: 12px;
    }

    .tips ul {
      list-style: none;
      font-size: 14px;
    }

    .tips li {
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
    }

    .tips li::before {
      content: '✓';
      position: absolute;
      left: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M23.64 6.92a11.86 11.86 0 0 0-3.43-3.43 11.93 11.93 0 0 0-4.64-1.74V1a1 1 0 0 0-2 0v.75a12 12 0 0 0-8.41 4.58A11.85 11.85 0 0 0 3.31 9.5 11.88 11.88 0 0 0 2 15a1 1 0 0 0 1 1h3.14a1 1 0 0 0 1-.86 6 6 0 0 1 5.22-5.22 1 1 0 0 0 .86-1V5.31a1 1 0 0 1 1.78-.62 11.86 11.86 0 0 0 3.43 3.43 11.93 11.93 0 0 0 4.64 1.74V9a1 1 0 0 0-2 0v.75a12 12 0 0 0-8.41 4.58A11.85 11.85 0 0 0 20.69 14.5 11.88 11.88 0 0 0 22 9a1 1 0 0 0-1-1h-3.14a1 1 0 0 0-1 .86 6 6 0 0 1-5.22 5.22 1 1 0 0 0-.86 1v3.31a1 1 0 0 1-1.78.62 11.86 11.86 0 0 0-3.43-3.43 11.93 11.93 0 0 0-4.64-1.74V17a1 1 0 0 0 2 0v-.75a12 12 0 0 0 8.41-4.58A11.85 11.85 0 0 0 17.69 11.5"/>
      </svg>
    </div>

    <h1>You're Offline</h1>

    <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>

    <button onclick="window.location.reload()">Try Again</button>

    <div class="tips">
      <h3>While Offline</h3>
      <ul>
        <li>Viewed pages are cached</li>
        <li>Your data is saved locally</li>
        <li>Syncs when back online</li>
      </ul>
    </div>
  </div>

  <script>
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
