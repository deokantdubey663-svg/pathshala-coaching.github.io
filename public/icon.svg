<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#115e59"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Open book icon -->
  <g fill="white">
    <!-- Left page -->
    <path d="M80 140 Q80 110 110 110 L230 110 Q250 110 250 130 L250 382 L110 382 Q80 382 80 352 Z" opacity="0.95"/>
    <path d="M90 150 Q90 130 110 130 L220 130 L220 370 L110 370 Q90 370 90 350 Z" fill="#0f766e" opacity="0.15"/>

    <!-- Right page -->
    <path d="M256 130 Q256 110 276 110 L402 110 Q432 110 432 140 L432 352 Q432 382 402 382 L256 370 Z" fill="white" opacity="0.95"/>
    <path d="M266 130 L392 130 Q412 130 412 150 L412 350 Q412 370 392 370 L266 370 Z" fill="#0f766e" opacity="0.15"/>

    <!-- Book spine shadow -->
    <rect x="248" y="105" width="18" height="280" fill="white" opacity="0.8"/>
    <rect x="250" y="110" width="14" height="270" fill="#0f766e" opacity="0.1"/>
  </g>

  <!-- Text lines for decoration -->
  <g fill="#0f766e" opacity="0.4">
    <rect x="110" y="180" width="120" height="8" rx="4"/>
    <rect x="110" y="200" width="100" height="8" rx="4"/>
    <rect x="110" y="220" width="110" height="8" rx="4"/>
    <rect x="110" y="240" width="90" height="8" rx="4"/>

    <rect x="282" y="180" width="120" height="8" rx="4"/>
    <rect x="282" y="200" width="110" height="8" rx="4"/>
    <rect x="282" y="220" width="100" height="8" rx="4"/>
    <rect x="282" y="240" width="115" height="8" rx="4"/>
  </g>

  <!-- Graduation cap -->
  <g transform="translate(256, 100)">
    <polygon points="-60,-40 0,-70 60,-40 0,-10" fill="#fbbf24"/>
    <polygon points="-60,-40 -60,-30 0,0 60,-30 60,-40" fill="#f59e0b"/>
    <line x1="50" y1="-35" x2="50" y2="30" stroke="#fbbf24" stroke-width="5"/>
    <circle cx="50" cy="38" r="10" fill="#fbbf24"/>
  </g>

  <!-- P letter for Pathshala at bottom -->
  <g transform="translate(256, 420)">
    <circle cx="0" cy="0" r="50" fill="white" opacity="0.2"/>
    <text x="0" y="20" text-anchor="middle" font-size="70" font-weight="bold" font-family="Georgia, serif" fill="white">P</text>
  </g>
</svg>
